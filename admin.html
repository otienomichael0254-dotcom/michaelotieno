<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Dashboard | Michael Otieno Ouma</title>
<meta name="description" content="Admin dashboard for managing portfolio projects.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<link rel="icon" type="image/png" href="kingi.png">
<link rel="apple-touch-icon" href="kingi.png">
<style>
  /* Admin-specific styles */
  body[data-theme="dark"] .admin-container {
    background: #0a0a0a;
    color: #e0e0e0;
  }
  body[data-theme="light"] .admin-container {
    background: #f5f5f5;
    color: #333;
  }
  
  .admin-container {
    min-height: 100vh;
    padding: 40px 20px;
  }

  .admin-wrapper {
    max-width: 1200px;
    margin: 0 auto;
  }

  .admin-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 32px;
    padding: 22px 24px;
    border: 1px solid var(--border-color);
    border-radius: 14px;
    background: linear-gradient(135deg, rgba(255,106,0,0.14), rgba(255,106,0,0.04));
    box-shadow: 0 10px 30px rgba(0,0,0,0.08);
  }

  .admin-header h1 {
    font-size: 32px;
    font-weight: 700;
  }

  .admin-header-right {
    display: flex;
    gap: 16px;
    align-items: center;
    flex-wrap: wrap;
  }

  #user-email {
    font-size: 14px;
    opacity: 0.7;
  }

  .btn-logout {
    background: var(--orange);
    color: white;
    padding: 10px 20px;
    border: none;
    border-radius: 999px;
    cursor: pointer;
    font-weight: 600;
    transition: transform 0.2s, opacity 0.2s;
  }

  .btn-logout:hover {
    transform: translateY(-1px);
    opacity: 0.95;
  }

  /* Auth Section */
  #auth-section {
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
  }

  .login-box {
    background: var(--card-bg);
    border: 1px solid var(--border-color);
    border-radius: 16px;
    padding: 40px;
    width: 100%;
    max-width: 400px;
    box-shadow: 0 20px 45px rgba(0,0,0,0.12);
  }

  .login-box h2 {
    font-size: 24px;
    margin-bottom: 30px;
    text-align: center;
  }

  .login-box .form-row {
    display: flex;
    flex-direction: column;
    gap: 15px;
  }

  .login-box label {
    font-weight: 600;
    font-size: 14px;
  }

  .login-box input {
    padding: 12px 16px;
    border: 1px solid var(--border-color);
    border-radius: 4px;
    background: var(--input-bg);
    color: inherit;
    font-size: 14px;
  }

  .login-box input:focus {
    outline: none;
    border-color: var(--orange);
    box-shadow: 0 0 0 2px rgba(255,106,0,0.1);
  }

  .login-box button {
    background: var(--orange);
    color: white;
    padding: 12px;
    border: none;
    border-radius: 4px;
    font-weight: 600;
    cursor: pointer;
    width: 100%;
    transition: opacity 0.2s;
  }

  .login-box button:hover {
    opacity: 0.9;
  }

  #login-status {
    margin-top: 15px;
    text-align: center;
    font-size: 14px;
    padding: 8px;
    border-radius: 4px;
  }

  #login-status.ok {
    background: rgba(76,175,80,0.1);
    color: #4caf50;
  }

  #login-status.err {
    background: rgba(244,67,54,0.1);
    color: #f44336;
  }

  /* Dashboard Section */
  #dashboard-section {
    display: none;
  }

  .dashboard-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 40px;
    margin-bottom: 40px;
  }

  @media (max-width: 900px) {
    .dashboard-grid {
      grid-template-columns: 1fr;
    }
  }

  .form-section {
    background: var(--card-bg);
    border: 1px solid var(--border-color);
    border-radius: 14px;
    padding: 30px;
    box-shadow: 0 8px 24px rgba(0,0,0,0.06);
  }

  .form-section h3 {
    font-size: 20px;
    margin-bottom: 20px;
  }

  .form-section .form-row {
    display: flex;
    flex-direction: column;
    gap: 15px;
    margin-bottom: 15px;
  }

  .form-section label {
    font-weight: 600;
    font-size: 14px;
  }

  .form-section input,
  .form-section textarea,
  .form-section select {
    padding: 10px 12px;
    border: 1px solid var(--border-color);
    border-radius: 4px;
    background: var(--input-bg);
    color: inherit;
    font-size: 14px;
    font-family: inherit;
  }

  .form-section input:focus,
  .form-section textarea:focus,
  .form-section select:focus {
    outline: none;
    border-color: var(--orange);
    box-shadow: 0 0 0 2px rgba(255,106,0,0.1);
  }

  .form-section textarea {
    resize: vertical;
    min-height: 100px;
  }

  .form-checkbox {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .form-checkbox input {
    width: auto;
    padding: 0;
    margin: 0;
  }

  .form-checkbox label {
    margin: 0;
  }

  #project-image-preview {
    display: none;
    max-width: 100%;
    max-height: 200px;
    border-radius: 4px;
    margin: 10px 0;
  }

  #form-status {
    margin-top: 15px;
    padding: 10px;
    border-radius: 4px;
    font-size: 14px;
    text-align: center;
  }

  #form-status.status.ok {
    background: rgba(76,175,80,0.1);
    color: #4caf50;
  }

  #form-status.status.err {
    background: rgba(244,67,54,0.1);
    color: #f44336;
  }

  .form-submit {
    background: var(--orange);
    color: white;
    padding: 12px;
    border: none;
    border-radius: 4px;
    font-weight: 600;
    cursor: pointer;
    width: 100%;
    transition: opacity 0.2s;
  }

  .form-submit:hover {
    opacity: 0.9;
  }

  /* Projects List */
  .projects-section {
    background: var(--card-bg);
    border: 1px solid var(--border-color);
    border-radius: 14px;
    padding: 30px;
    box-shadow: 0 8px 24px rgba(0,0,0,0.06);
  }

  .projects-section h3 {
    font-size: 20px;
    margin-bottom: 20px;
  }

  #projects-list {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 20px;
  }

  .admin-project-card {
    border: 1px solid var(--border-color);
    border-radius: 6px;
    padding: 15px;
    background: var(--input-bg);
  }

  .admin-project-header {
    display: flex;
    justify-content: space-between;
    align-items: start;
    margin-bottom: 10px;
  }

  .admin-project-header h3 {
    font-size: 16px;
    margin: 0;
  }

  .dashboard-summary {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 20px;
    margin-bottom: 24px;
  }

  .summary-card,
  .messages-section {
    background: var(--card-bg);
    border: 1px solid var(--border-color);
    border-radius: 14px;
    padding: 24px;
    box-shadow: 0 8px 24px rgba(0,0,0,0.06);
  }

  .summary-label {
    font-size: 13px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    opacity: 0.7;
    margin-bottom: 8px;
  }

  .summary-value {
    font-size: 34px;
    font-weight: 700;
    color: var(--orange);
  }

  .summary-subtext {
    font-size: 13px;
    opacity: 0.7;
    margin-top: 8px;
  }

  .messages-section {
    margin-bottom: 24px;
  }

  .messages-section h3 {
    font-size: 20px;
    margin-bottom: 16px;
  }

  .message-card {
    border: 1px solid var(--border-color);
    border-radius: 10px;
    padding: 14px;
    margin-bottom: 12px;
    background: var(--input-bg);
    transition: transform 0.2s, box-shadow 0.2s;
  }

  .message-card:hover {
    transform: translateY(-1px);
    box-shadow: 0 8px 20px rgba(0,0,0,0.06);
  }

  .message-card.unread {
    border-left: 4px solid var(--orange);
  }

  .message-card.is-read {
    opacity: 0.8;
    border-left: 4px solid #4caf50;
  }

  .message-card-header {
    display: flex;
    justify-content: space-between;
    gap: 12px;
    margin-bottom: 8px;
    font-size: 13px;
    opacity: 0.8;
  }

  .message-card p {
    margin: 4px 0;
    font-size: 13px;
  }

  .message-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--orange);
    margin-bottom: 6px;
  }

  .message-actions {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    margin-top: 10px;
  }

  .btn-action {
    padding: 7px 12px;
    border: none;
    border-radius: 999px;
    font-size: 12px;
    cursor: pointer;
    font-weight: 600;
    background: rgba(255,106,0,0.12);
    color: var(--orange);
  }

  .btn-action.danger {
    background: rgba(244,67,54,0.12);
    color: #f44336;
  }

  .btn-action:hover {
    opacity: 0.95;
  }

  .empty-state {
    text-align: center;
    opacity: 0.7;
    padding: 30px 10px;
  }

  .admin-project-actions {
    display: flex;
    gap: 8px;
  }

  .btn-small {
    padding: 6px 12px;
    font-size: 12px;
    border: none;
    border-radius: 3px;
    cursor: pointer;
    transition: opacity 0.2s;
  }

  .btn-edit {
    background: var(--orange);
    color: white;
  }

  .btn-delete {
    background: #f44336;
    color: white;
  }

  .btn-small:hover {
    opacity: 0.9;
  }

  .admin-project-desc {
    font-size: 13px;
    opacity: 0.8;
    margin: 8px 0;
  }

  .admin-project-meta {
    font-size: 12px;
    opacity: 0.6;
    margin: 8px 0;
  }

  .admin-project-thumb {
    width: 100%;
    height: 180px;
    object-fit: cover;
    border-radius: 4px;
    margin-top: 10px;
  }

  #projects-list > p {
    padding: 40px 20px;
    text-align: center;
    opacity: 0.6;
  }
</style>
</head>
<body>

<div class="topline"></div>

<header>
  <nav>
    <div class="logo">Michael Otieno Ouma</div>
    <button class="menu-toggle" aria-label="Toggle menu">☰</button>
    <div class="nav-links">
      <a href="index.html">Home</a>
      <a href="projects.html">Projects</a>
      <a href="services.html">Services</a>
      <a href="contact.html">Contact</a>
    </div>
    <div class="nav-right">
      <button class="theme-toggle" aria-label="Toggle dark/light theme">🌙</button>
      <a href="cv.pdf" class="btn btn-fill nav-cta">Download CV</a>
    </div>
  </nav>
</header>

<div class="admin-container">
  <div class="admin-wrapper">

    <!-- AUTH SECTION (Login) -->
    <section id="auth-section">
      <div class="login-box">
        <h2>Admin Login</h2>
        <form id="login-form">
          <div class="form-row">
            <label for="login-email">Email Address</label>
            <input id="login-email" name="otienomichael0254@gmail.com" type="email" required>
          </div>
          <div class="form-row">
            <label for="login-password">Password</label>
            <input id="login-password" name="kerry1195" type="password" required>
          </div>
          <button type="submit">Login</button>
          <div id="login-status"></div>
        </form>
      </div>
    </section>

    <!-- DASHBOARD SECTION (Projects Management) -->
    <section id="dashboard-section">
      <div class="admin-header">
        <h1>Portfolio Admin</h1>
        <div class="admin-header-right">
          <div>Logged in as <strong id="user-email"></strong></div>
          <button id="logout-btn" class="btn-logout">Logout</button>
        </div>
      </div>

      <div class="dashboard-summary">
        <div class="summary-card">
          <div class="summary-label">Site Visits</div>
          <div id="visitor-count" class="summary-value">0</div>
          <div class="summary-subtext">Live visitor count from the public site</div>
        </div>
        <div class="summary-card">
          <div class="summary-label">Messages</div>
          <div id="message-count" class="summary-value">0</div>
          <div class="summary-subtext">Latest contact form submissions</div>
        </div>
      </div>

      <div class="messages-section">
        <h3>Contact Messages</h3>
        <div id="messages-list"></div>
      </div>

      <div class="dashboard-grid">
        
        <!-- Project Form -->
        <div class="form-section">
          <h3>Add / Edit Project</h3>
          <form id="project-form">
            <input type="hidden" id="project-id">
            
            <div class="form-row">
              <label for="project-title">Project Title *</label>
              <input id="project-title" type="text" required>
            </div>

            <div class="form-row">
              <label for="project-description">Description *</label>
              <textarea id="project-description" required></textarea>
            </div>

            <div class="form-row">
              <label for="project-category">Category</label>
              <select id="project-category">
                <option value="">Select category…</option>
                <option>Web Application</option>
                <option>Mobile App</option>
                <option>Full-Stack Project</option>
                <option>Client Portfolio</option>
                <option>Dev Tool</option>
                <option>Design Work</option>
                <option>Startup</option>
              </select>
            </div>

            <div class="form-row">
              <label for="project-github">GitHub Link</label>
              <input id="project-github" type="url" placeholder="https://github.com/...">
            </div>

            <div class="form-row">
              <label for="project-demo">Live Demo Link</label>
              <input id="project-demo" type="url" placeholder="https://example.com">
            </div>

            <div class="form-row">
              <label for="project-tags">Tags (comma-separated)</label>
              <input id="project-tags" type="text" placeholder="React, Node.js, JavaScript">
            </div>

            <div class="form-row">
              <label for="project-image">Project Image</label>
              <input id="project-image" type="file" accept="image/*">
              <img id="project-image-preview" alt="Preview">
            </div>

            <div class="form-checkbox">
              <input id="project-featured" type="checkbox">
              <label for="project-featured">Featured Project ★</label>
            </div>

            <button type="submit" class="form-submit">Save Project</button>
            <button type="button" class="form-submit" style="background: #666; margin-top: 8px;" onclick="resetProjectForm()">Clear Form</button>
            <div id="form-status"></div>
          </form>
        </div>

        <!-- Projects List -->
        <div class="projects-section">
          <h3>Your Projects</h3>
          <div id="projects-list"></div>
        </div>

      </div> 

    </section>

  </div>
</div>

<script src="script.js"></script>
<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-storage-compat.js"></script>
<script src="firebase-config.js"></script>
<script src="admin.js"></script>

</body>
</html>
